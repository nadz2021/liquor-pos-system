<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450" role="img" aria-label="No image available">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3F4F6"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" rx="28" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="110" cy="90" r="70" fill="#EDE9FE"/>
  <circle cx="520" cy="110" r="80" fill="#DBEAFE"/>
  <circle cx="470" cy="390" r="95" fill="#DCFCE7"/>

  <!-- Inner card -->
  <rect x="70" y="70" width="460" height="310" rx="24" fill="url(#card)" stroke="#E5E7EB" filter="url(#shadow)"/>

  <!-- Image icon -->
  <g transform="translate(0,0)">
    <rect x="170" y="130" width="260" height="170" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="220" cy="175" r="18" fill="#E5E7EB"/>
    <path d="M190 275 L260 210 L310 255 L360 220 L410 275 Z" fill="#E5E7EB"/>
    <path d="M190 275 L260 210 L310 255 L360 220 L410 275" fill="none" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="300" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#374151">
    No Image
  </text>
  <text x="300" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6B7280">
    Upload a product photo
  </text>
</svg>